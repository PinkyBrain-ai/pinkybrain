<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Top gradient border -->
  <rect width="1280" height="3" fill="url(#topBorder)"/>
  
  <!-- Bottom border -->
  <rect y="637" width="1280" height="3" fill="#4ecdc4" opacity="0.6"/>
  
  <!-- Logo icon -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="44" height="44" rx="8" fill="none" stroke="#4ecdc4" stroke-width="2.5"/>
    <line x1="10" y1="10" x2="34" y2="34" stroke="#4ecdc4" stroke-width="2" opacity="0.7"/>
    <line x1="34" y1="10" x2="10" y2="34" stroke="#4ecdc4" stroke-width="2" opacity="0.7"/>
    <circle cx="22" cy="22" r="6" fill="#4ecdc4" opacity="0.3"/>
  </g>
  
  <!-- Title -->
  <text x="120" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="42" fill="#4ecdc4" font-weight="300" letter-spacing="2">PinkyBrain</text>
  <text x="120" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#8892B0" letter-spacing="1">P2P Distributed AI Network</text>
  
  <!-- Value proposition -->
  <text x="60" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#ffffff" font-weight="400">No central server. No accounts. No premium.</text>
  <text x="60" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#8892B0">Connect machines, share models, sync memory.</text>
  
  <!-- Feature boxes -->
  <!-- Box 1: Multi-LLM -->
  <rect x="60" y="280" width="280" height="100" rx="8" fill="#131633" stroke="#2A2D55" stroke-width="1.5"/>
  <rect x="76" y="296" width="24" height="24" rx="4" fill="none" stroke="#4ecdc4" stroke-width="1.5"/>
  <line x1="82" y1="302" x2="94" y2="314" stroke="#4ecdc4" stroke-width="1.2" opacity="0.7"/>
  <line x1="94" y1="302" x2="82" y2="314" stroke="#4ecdc4" stroke-width="1.2" opacity="0.7"/>
  <text x="112" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#4ecdc4" font-weight="500">Multi-LLM</text>
  <text x="112" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8892B0">Ollama · OpenAI · Anthropic</text>
  
  <!-- Box 2: CRDT Memory -->
  <rect x="360" y="280" width="280" height="100" rx="8" fill="#131633" stroke="#2A2D55" stroke-width="1.5"/>
  <rect x="376" y="296" width="24" height="24" rx="4" fill="none" stroke="#F1FA8C" stroke-width="1.5"/>
  <line x1="382" y1="302" x2="394" y2="314" stroke="#F1FA8C" stroke-width="1.2" opacity="0.7"/>
  <line x1="394" y1="302" x2="382" y2="314" stroke="#F1FA8C" stroke-width="1.2" opacity="0.7"/>
  <text x="412" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#F1FA8C" font-weight="500">CRDT Memory</text>
  <text x="412" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8892B0">Conflict-free · Gossip sync</text>
  
  <!-- Box 3: Ed25519 Auth -->
  <rect x="60" y="400" width="280" height="100" rx="8" fill="#131633" stroke="#2A2D55" stroke-width="1.5"/>
  <rect x="76" y="416" width="24" height="24" rx="4" fill="none" stroke="#FF5555" stroke-width="1.5"/>
  <line x1="82" y1="422" x2="94" y2="434" stroke="#FF5555" stroke-width="1.2" opacity="0.7"/>
  <line x1="94" y1="422" x2="82" y2="434" stroke="#FF5555" stroke-width="1.2" opacity="0.7"/>
  <text x="112" y="434" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#FF5555" font-weight="500">Ed25519 Auth</text>
  <text x="112" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8892B0">Web of Trust · Stealth mode</text>
  
  <!-- Box 4: P2P Mesh -->
  <rect x="360" y="400" width="280" height="100" rx="8" fill="#131633" stroke="#2A2D55" stroke-width="1.5"/>
  <rect x="376" y="416" width="24" height="24" rx="4" fill="none" stroke="#BD93F9" stroke-width="1.5"/>
  <line x1="382" y1="422" x2="394" y2="434" stroke="#BD93F9" stroke-width="1.2" opacity="0.7"/>
  <line x1="394" y1="422" x2="382" y2="434" stroke="#BD93F9" stroke-width="1.2" opacity="0.7"/>
  <text x="412" y="434" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#BD93F9" font-weight="500">P2P Mesh</text>
  <text x="412" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8892B0">Auto-discovery · WebSocket</text>
  
  <!-- Right side: Network visualization -->
  <g transform="translate(800, 60)">
    <!-- Outer ring -->
    <circle cx="220" cy="260" r="220" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.08" stroke-dasharray="8 6"/>
    <circle cx="220" cy="260" r="170" fill="none" stroke="#4ecdc4" stroke-width="0.8" opacity="0.06"/>
    <circle cx="220" cy="260" r="120" fill="none" stroke="#4ecdc4" stroke-width="0.6" opacity="0.05"/>
    
    <!-- Connection lines -->
    <g stroke="#4ecdc4" stroke-width="2.5" opacity="0.3">
      <line x1="220" y1="140" x2="340" y2="220"/>
      <line x1="220" y1="140" x2="100" y2="220"/>
      <line x1="340" y1="220" x2="340" y2="340"/>
      <line x1="100" y1="220" x2="100" y2="340"/>
      <line x1="220" y1="140" x2="220" y2="380"/>
      <line x1="100" y1="340" x2="340" y2="340"/>
      <line x1="340" y1="220" x2="100" y2="340"/>
      <line x1="100" y1="220" x2="340" y2="340"/>
    </g>
    
    <!-- Animated data dots -->
    <circle cx="280" cy="180" r="4" fill="#4ecdc4" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="180" r="4" fill="#ff6b6b" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="260" r="4" fill="#ffe66d" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Nodes -->
    <circle cx="220" cy="140" r="36" fill="#131633" stroke="#4ecdc4" stroke-width="2.5"/>
    <text x="220" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="30" fill="#4ecdc4">🐛</text>
    <text x="220" y="108" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ecdc4" font-weight="bold">BUG</text>
    
    <circle cx="340" cy="340" r="30" fill="#131633" stroke="#ff6b6b" stroke-width="2.5"/>
    <text x="340" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#ff6b6b">🩷</text>
    <text x="340" y="382" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6b6b" font-weight="bold">PINKY</text>
    
    <circle cx="100" cy="340" r="30" fill="#131633" stroke="#ffe66d" stroke-width="2.5"/>
    <text x="100" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#ffe66d">🖥️</text>
    <text x="100" y="382" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffe66d" font-weight="bold">NODE</text>
    
    <circle cx="340" cy="220" r="20" fill="#131633" stroke="#4ecdc4" stroke-width="1.5" opacity="0.6"/>
    <text x="340" y="226" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ecdc4">AI</text>
    
    <circle cx="100" cy="220" r="20" fill="#131633" stroke="#4ecdc4" stroke-width="1.5" opacity="0.6"/>
    <text x="100" y="226" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ecdc4">AI</text>
  </g>
  
  <!-- Footer stats -->
  <text x="60" y="570" font-family="monospace" font-size="12" fill="#8892B0">0.16s startup · 17 MB RAM · 4 dependencies · Python 3.8+</text>
  
  <!-- Version badge -->
  <rect x="60" y="600" width="80" height="24" rx="12" fill="#4ecdc4" opacity="0.15"/>
  <text x="100" y="616" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ecdc4" font-weight="bold">v5.2</text>
</svg>