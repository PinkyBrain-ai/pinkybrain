<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44b8a8;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.15" stroke-dasharray="8 6"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.1"/>
  
  <!-- Connection lines (P2P mesh) -->
  <g stroke="#4ecdc4" stroke-width="3" opacity="0.5" filter="url(#blur)">
    <line x1="256" y1="140" x2="370" y2="220"/>
    <line x1="256" y1="140" x2="142" y2="220"/>
    <line x1="370" y1="220" x2="370" y2="340"/>
    <line x1="142" y1="220" x2="142" y2="340"/>
    <line x1="256" y1="140" x2="256" y2="370"/>
    <line x1="142" y1="340" x2="370" y2="340"/>
  </g>
  <g stroke="#4ecdc4" stroke-width="2" opacity="0.7">
    <line x1="256" y1="140" x2="370" y2="220"/>
    <line x1="256" y1="140" x2="142" y2="220"/>
    <line x1="370" y1="220" x2="370" y2="340"/>
    <line x1="142" y1="220" x2="142" y2="340"/>
    <line x1="256" y1="140" x2="256" y2="370"/>
    <line x1="142" y1="340" x2="370" y2="340"/>
  </g>
  
  <!-- Data flow dots on connections -->
  <circle cx="313" cy="180" r="5" fill="#4ecdc4" opacity="0.9">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="199" cy="180" r="5" fill="#ff6b6b" opacity="0.9">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="255" r="5" fill="#ffe66d" opacity="0.9">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Node: Bug (top) -->
  <circle cx="256" cy="140" r="36" fill="#1a1a3e" stroke="#4ecdc4" stroke-width="3"/>
  <text x="256" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="32" fill="#4ecdc4">🐛</text>
  <text x="256" y="108" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ecdc4" font-weight="bold">BUG</text>
  
  <!-- Node: Pinky (bottom-right) -->
  <circle cx="370" cy="340" r="30" fill="#1a1a3e" stroke="#ff6b6b" stroke-width="3"/>
  <text x="370" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" fill="#ff6b6b">🩷</text>
  <text x="370" y="382" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6b6b" font-weight="bold">PINKY</text>
  
  <!-- Node: generic (bottom-left) -->
  <circle cx="142" cy="340" r="30" fill="#1a1a3e" stroke="#ffe66d" stroke-width="3"/>
  <text x="142" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="26" fill="#ffe66d">🖥️</text>
  <text x="142" y="382" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffe66d" font-weight="bold">NODE</text>
  
  <!-- Side nodes -->
  <circle cx="370" cy="220" r="22" fill="#1a1a3e" stroke="#4ecdc4" stroke-width="2" opacity="0.7"/>
  <text x="370" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ecdc4">AI</text>
  
  <circle cx="142" cy="220" r="22" fill="#1a1a3e" stroke="#4ecdc4" stroke-width="2" opacity="0.7"/>
  <text x="142" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ecdc4">AI</text>
  
  <!-- Title -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="white" font-weight="bold" letter-spacing="4">PINKYBRAIN</text>
  <text x="256" y="465" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ecdc4" letter-spacing="2">P2P DISTRIBUTED AI</text>
  
  <!-- Version badge -->
  <rect x="356" y="418" width="52" height="20" rx="10" fill="#4ecdc4" opacity="0.2"/>
  <text x="382" y="432" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecdc4" font-weight="bold">v5.2</text>
</svg>